<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест для студентов</title>
    <style>
        /* Настройки темы через переменные */
        :root {
            --bg-color: #0f172a; /* Темный фон (по умолчанию) */
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent: #38bdf8;
            --btn-hover: #0ea5e9;
        }

        /* Класс для светлой темы */
        body.light-mode {
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --accent: #2563eb;
            --btn-hover: #1d4ed8;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        /* Счетчик сверху справа */
        #counter {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            background: var(--card-bg);
            padding: 8px 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .quiz-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .option-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid var(--accent);
            border-radius: 8px;
            background: transparent;
            color: var(--text-color);
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
        }

        .option-btn:hover {
            background: var(--accent);
            color: white;
        }

        .theme-btn {
            margin-top: 20px;
            background: none;
            border: 1px solid var(--text-color);
            color: var(--text-color);
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            opacity: 0.7;
        }

        .restart-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            margin-top: 20px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="counter">Вопрос: 1/25</div>

    <div id="quiz-screen" class="quiz-card">
        <h2 id="question-title">Загрузка...</h2>
        <div id="options-box"></div>
        <button class="theme-btn" onclick="toggleTheme()">Сменить тему</button>
    </div>

    <div id="result-screen" class="quiz-card hidden">
        <h2>Тест завершен!</h2>
        <p id="final-score" style="font-size: 1.5rem;"></p>
        <button class="restart-btn" onclick="restartQuiz()">Начать заново</button>
    </div>

    <script>
        const TOTAL_QUESTIONS = 25;
        let currentIdx = 0;
        let score = 0;

        // Генерация вопросов (замени своими данными)
        const questions = Array.from({ length: TOTAL_QUESTIONS }, (_, i) => ({
            text: `Вопрос №${i + 1}: Выберите правильный вариант`,
            options: ["Вариант A", "Вариант B", "Вариант C"],
            correct: 0 
        }));

        function render() {
            if (currentIdx >= TOTAL_QUESTIONS) {
                showResults();
                return;
            }

            const q = questions[currentIdx];
            document.getElementById('counter').innerText = `Вопрос: ${currentIdx + 1}/${TOTAL_QUESTIONS}`;
            document.getElementById('question-title').innerText = q.text;
            
            const box = document.getElementById('options-box');
            box.innerHTML = '';

            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => handleAnswer(index);
                box.appendChild(btn);
            });
        }

        function handleAnswer(choice) {
            if (choice === questions[currentIdx].correct) {
                score++;
            }
            currentIdx++;
            render();
        }

        function showResults() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = `Результат: ${score} из ${TOTAL_QUESTIONS}`;
        }

        function restartQuiz() {
            currentIdx = 0;
            score = 0;
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            render();
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
        }

        // Старт
        render();
    </script>
</body>
</html>
